name: Update News List

on:
  push:
    paths:
      - 'content/News/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-news-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Update news list in index.md
        run: |
          # 뉴스 폴더에서 최신 파일 5개 가져오기 (null로 구분하여 공백 문제 해결)
          echo "**최신 뉴스:**" > temp_news.md
          
          find content/News -name "*.md" -type f ! -name "index.md" -print0 | \
          sort -rz | \
          head -z -n 5 | \
          while IFS= read -r -d '' file; do
            filename=$(basename "$file" .md)
            relative_path=${file#content/}
            link_path=${relative_path%.md}
            echo "- [$filename](./$link_path)" >> temp_news.md
          done
          
          echo "" >> temp_news.md
          echo "→ [모든 뉴스 보기](./News/)" >> temp_news.md
          
          # content/index.md에서 뉴스 섹션 업데이트
          awk '/<!-- NEWS_START -->/ { print; system("cat temp_news.md"); skip=1; next } /<!-- NEWS_END -->/ { skip=0 } !skip' content/index.md > index_new.md
          mv index_new.md content/index.md
          rm temp_news.md

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add content/index.md
            git commit -m "자동 업데이트: 최신 뉴스 목록"
            git push
          else
            echo "변경사항이 없습니다."
          fi
